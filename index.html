<!DOCTYPE html>
<html>
<head>
<style>
body{background:#1a2e22;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;flex-direction:column;gap:20px;}
#users{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
button{padding:10px 20px;border-radius:20px;border:1px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.1);color:white;font-size:16px;cursor:pointer;}
button.sel{background:#6B9E7A;}
#dots{display:flex;gap:12px;}
.dot{width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,0.2);}
.dot.on{background:white;}
#pad{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;width:280px;}
.key{height:64px;border-radius:12px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.1);color:white;font-size:22px;cursor:pointer;}
.key:active{background:rgba(255,255,255,0.4);}
#msg{color:white;font-size:14px;min-height:20px;}
</style>
</head>
<body>

<div id="users"></div>
<div id="dots">
  <div class="dot" id="d0"></div>
  <div class="dot" id="d1"></div>
  <div class="dot" id="d2"></div>
  <div class="dot" id="d3"></div>
</div>
<div id="pad">
  <button class="key" data-pin="1">1</button>
  <button class="key" data-pin="2">2</button>
  <button class="key" data-pin="3">3</button>
  <button class="key" data-pin="4">4</button>
  <button class="key" data-pin="5">5</button>
  <button class="key" data-pin="6">6</button>
  <button class="key" data-pin="7">7</button>
  <button class="key" data-pin="8">8</button>
  <button class="key" data-pin="9">9</button>
  <button class="key" style="opacity:0;pointer-events:none;"></button>
  <button class="key" data-pin="0">0</button>
  <button class="key" data-pin="del">⌫</button>
</div>
<div id="msg">이름 선택 후 PIN 입력</div>

<script>
var staffList = [
  {id:1, name:'Hai Linh Tran', pin:'1111'},
  {id:2, name:'Xiao Wei', pin:'2222'},
];
var jennyPin = '0000';
var entry = '';
var selected = null;

// Build user buttons
var users = document.getElementById('users');
var jb = document.createElement('button');
jb.textContent = 'Jenny';
jb.onclick = function(){ select('jenny'); };
users.appendChild(jb);
staffList.forEach(function(s){
  var b = document.createElement('button');
  b.textContent = s.name.split(' ')[0];
  b.onclick = function(){ select(s.id); };
  users.appendChild(b);
});

function select(id){
  selected = id;
  entry = '';
  updateDots();
  document.querySelectorAll('#users button').forEach(function(b){ b.classList.remove('sel'); });
  document.getElementById('msg').textContent = 'PIN 입력하세요';
}

// Pad listener
document.getElementById('pad').addEventListener('click', function(e){
  var btn = e.target.closest('[data-pin]');
  if(!btn) return;
  var v = btn.getAttribute('data-pin');
  if(v === 'del'){ entry = entry.slice(0,-1); }
  else if(entry.length < 4){ entry += v; }
  updateDots();
  if(entry.length === 4) setTimeout(check, 150);
});
document.getElementById('pad').addEventListener('touchend', function(e){
  e.preventDefault();
  var btn = e.target.closest('[data-pin]');
  if(!btn) return;
  var v = btn.getAttribute('data-pin');
  if(v === 'del'){ entry = entry.slice(0,-1); }
  else if(entry.length < 4){ entry += v; }
  updateDots();
  if(entry.length === 4) setTimeout(check, 150);
});

function updateDots(){
  for(var i=0;i<4;i++){
    var d = document.getElementById('d'+i);
    d.className = 'dot' + (i < entry.length ? ' on' : '');
  }
}

function check(){
  var correct = selected === 'jenny' ? jennyPin :
    (staffList.find(function(s){ return s.id === selected; })||{}).pin || '';
  if(entry === correct){
    document.getElementById('msg').textContent = '✅ 성공!';
  } else {
    document.getElementById('msg').textContent = '❌ 틀린 PIN';
    entry = '';
    updateDots();
  }
}
</script>
</body>
</html>
